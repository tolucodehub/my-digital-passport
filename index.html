<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/cmc-logo.png" type="image/png" />
    <title>CoinMarketCap – Cryptocurrency Prices, Charts & Market Cap</title>
    <meta name="description" content="Top cryptocurrency prices and charts, listed by market capitalization. Free access to current and historic data for Bitcoin and thousands of altcoins." />

    <meta property="og:title" content="CoinMarketCap – Cryptocurrency Prices, Charts & Market Cap" />
    <meta property="og:description" content="Top cryptocurrency prices and charts, listed by market capitalization. Free access to current and historic data for Bitcoin and thousands of altcoins." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <!-- Google Translate: hidden widget; header dropdown triggers it programmatically -->
    <div id="google_translate_element" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;" aria-hidden="true"></div>
    <script>
      function googleTranslateElementInit() {
        if (typeof google !== 'undefined' && google.translate) {
          new google.translate.TranslateElement(
            { pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE },
            'google_translate_element'
          );
        }
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
